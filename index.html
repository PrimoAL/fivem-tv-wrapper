<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Astro TV Player</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none; 
        }
    </style>
</head>
<body>
    <iframe 
        id="yt-player" 
        src="" 
        frameborder="0" 
        allow="autoplay; encrypted-media" 
        allowfullscreen>
    </iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('v');

        if (videoId) {
            const iframe = document.getElementById('yt-player');
            iframe.src = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&controls=0&disablekb=1&fs=0&rel=0&modestbranding=1&iv_load_policy=3&loop=1&playlist=${videoId}&mute=0`;
        }
    </script>
</body>
</html>
