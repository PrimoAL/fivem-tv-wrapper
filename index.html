<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Astro TV</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        #player-container { width: 100%; height: 100%; }
    </style>
    <script src="https://player.twitch.tv/js/embed/v1.js"></script>
</head>
<body>
    <div id="player-container"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const youtubeId = urlParams.get('v');
        const twitchChannel = urlParams.get('twitch');
        const container = document.getElementById('player-container');

        if (twitchChannel) {
            new Twitch.Player("player-container", {
                channel: twitchChannel,
                width: "100%",
                height: "100%",
                autoplay: true,
                muted: false,
                parent: ["primoal.github.io"]
            });
        } else if (youtubeId) {
            container.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${youtubeId}?autoplay=1&controls=1&disablekb=1&fs=0&rel=0&modestbranding=1&iv_load_policy=3&loop=1&playlist=${youtubeId}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        } else {
            container.innerHTML = '<div style="color:white; text-align:center; font-family:sans-serif; margin-top:20%;">Warte auf Signal...</div>';
        }
    </script>
</body>
</html>
