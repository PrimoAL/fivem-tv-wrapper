<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Astro TV</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; pointer-events: none; }
    </style>
</head>
<body>
    <iframe id="yt-player" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('v');

        if (videoId) {
            document.getElementById('yt-player').src = `https://inv.tux.pizza/embed/${videoId}?autoplay=1&loop=1`;
        }
    </script>
</body>
</html>
